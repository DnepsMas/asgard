assistant:
  name: "阿斯加德"
  user_profile: |
    我是北京邮电大学计算机学院大一学生，在沙河校区。
    请优先关注这些内容：
    1. 计算机学院、计算机相关课程、学院活动、实验班、训练营。
    2. 面向大一、大二、本科低年级、新生的通知。
    3. 沙河校区相关安排、学习和生活通知。
    4. 各类竞赛、报名、选拔、创新项目、科研机会、交流项目。
    5. 选课、考试、成绩、补考、转专业、奖学金、重要截止时间。
  extra_instruction: |
    如果标题先看就明显是干部任免、纯行政背景信息或和普通学生关系很弱，可以直接降为低优先级。
  priority_keywords:
    - "计算机学院"
    - "大一"
    - "大二"
    - "沙河"
    - "竞赛"
    - "报名"
    - "选拔"
    - "训练营"
    - "创新"
    - "程序设计"
    - "实验班"
  ignore_keywords:
    - "干部"
    - "任免"
    - "党委"

llm:
  enabled: true
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL}"
  model: "${AI_MODEL}"
  temperature: 0.1
  max_input_chars: 4000
  timeout_seconds: 60
  title_batch_size: 40
  body_batch_size: 8
  body_excerpt_chars: 1800

auth:
  enabled: true
  type: "cas"
  login_url: "https://auth.bupt.edu.cn/authserver/login"
  service_url: "http://my.bupt.edu.cn/list.jsp?urltype=tree.TreeTempUrl&wbtreeid=1154"
  username: "${MY_BUPT_USERNAME}"
  password: "${MY_BUPT_PASSWORD}"

cookies:
  header: "${MY_BUPT_COOKIE}"
  map: {}

runtime:
  request_timeout: 15
  request_retries: 2
  retry_backoff_seconds: 1.0
  polling_interval: 1800
  page_delay_seconds: 0.2
  max_items_per_portal: 30
  max_detail_chars: 5000
  trust_env_proxy: false

storage:
  path: "storage.json"

ucloud:
  enabled: true
  api_base_url: "https://apiucloud.bupt.edu.cn/ykt-site"
  homepage_url: "https://ucloud.bupt.edu.cn/"
  login_url: "https://auth.bupt.edu.cn/authserver/login"
  service_url: "https://ucloud.bupt.edu.cn"
  course_scope: "current"
  term_name: "auto"
  username: "${UCLOUD_USERNAME}"
  password: "${UCLOUD_PASSWORD}"
  token: "${UCLOUD_TOKEN}"
  user_id: "${UCLOUD_USER_ID}"
  cookie_header: "${UCLOUD_COOKIE}"
  cookie_map: {}
  max_items: 30

tasks:
  path: "tasks.json"
  urgent_window_hours: 24
  include_in_morning_digest: true

schedule:
  enabled: true
  source: "jwgl_online"
  excel_path: "config/course_schedule.xlsx"
  sheet_name: ""
  day_start_hour: 8
  day_end_hour: 22
  max_daily_suggestions: 4
  online_enabled: true
  online_timeout_seconds: 15
  jwgl_login_mode: "auto"
  jwgl_login_url: "https://jwgl.bupt.edu.cn/jsxsd/"
  jwgl_service_url: ""
  jwgl_entry_url: "https://jwgl.bupt.edu.cn/jsxsd/framework/xsMain_bjyddx.jsp"
  jwgl_login_submit_url: "https://jwgl.bupt.edu.cn/jsxsd/xk/LoginToXk"
  jwgl_timetable_url: "https://jwgl.bupt.edu.cn/jsxsd/xskb/xskb_list.do"
  jwgl_username: "${JWGL_USERNAME}"
  jwgl_password: "${JWGL_PASSWORD}"
  jwgl_username_field: "username"
  jwgl_password_field: "password"

scheduler:
  enabled: true
  heartbeat_interval_hours: 2
  active_start: "08:00"
  active_end: "22:00"
  morning_digest_time: "08:00"
  evening_digest_time: "20:00"
  daytime_email_levels:
    - "important"
    - "watch"
  digest_only_portals:
    - "校园新闻"
  silent_when_empty: true
  deadline_horizon_days: 3
  post_send_mail_poll_window_seconds: 120
  post_send_mail_poll_interval_seconds: 15

output:
  report_path: "output/notices.md"
  json_report_path: "output/notices.json"
  heartbeat_report_path: "output/heartbeat.md"
  heartbeat_json_report_path: "output/heartbeat.json"
  morning_digest_report_path: "output/morning_digest.md"
  morning_digest_json_report_path: "output/morning_digest.json"
  evening_digest_report_path: "output/evening_digest.md"
  evening_digest_json_report_path: "output/evening_digest.json"
  task_receipt_report_path: "output/task_receipt.md"
  task_receipt_json_report_path: "output/task_receipt.json"
  log_path: "output/asgard.log"

email:
  enabled: true
  smtp_host: "${EMAIL_SMTP_HOST}"
  smtp_port: "${EMAIL_SMTP_PORT}"
  use_ssl: "${EMAIL_USE_SSL}"
  username: "${EMAIL_USERNAME}"
  password: "${EMAIL_PASSWORD}"
  from_addr: "${EMAIL_FROM}"
  to_addrs:
    - "${EMAIL_TO}"
  subject_prefix: "[阿斯加德]"

inbound_email:
  enabled: true
  imap_host: "${INBOUND_EMAIL_IMAP_HOST}"
  imap_port: "${INBOUND_EMAIL_IMAP_PORT}"
  use_ssl: "${INBOUND_EMAIL_USE_SSL}"
  username: "${INBOUND_EMAIL_USERNAME}"
  password: "${INBOUND_EMAIL_PASSWORD}"
  folder: "INBOX"
  poll_interval_seconds: 300
  allowed_from_addrs:
    - "${INBOUND_EMAIL_ALLOWED_FROM}"
  subject_prefix: "[阿斯加德任务]"
  accept_standalone_commands: false
  mark_seen_after_process: true
  state_path: "mailbox_state.json"

portals:
  - name: "校内通知"
    url: "http://my.bupt.edu.cn/list.jsp?totalpage=30&PAGENUM={page}&urltype=tree.TreeTempUrl&wbtreeid=1154"
    source: "北邮校园网"
    pages: 2
    page_start: 0
    selectors:
      item: "ul.newslist.list-unstyled > li"
      title: "a"
      link: "a"
      published_at: "span.time"
      source: "span.author"
      detail_content:
        - "#vsb_content"
        - ".article"
        - ".v_news_content"

  - name: "办事指南"
    url: "http://my.bupt.edu.cn/list.jsp?totalpage=30&PAGENUM={page}&urltype=tree.TreeTempUrl&wbtreeid=1524"
    source: "北邮校园网"
    pages: 1
    page_start: 0
    selectors:
      item: "ul.newslist.list-unstyled > li"
      title: "a"
      link: "a"
      published_at: "span.time"
      source: "span.author"
      detail_content:
        - "#vsb_content"
        - ".article"
        - ".v_news_content"

  - name: "校园新闻"
    url: "http://my.bupt.edu.cn/list.jsp?totalpage=30&PAGENUM={page}&urltype=tree.TreeTempUrl&wbtreeid=1221"
    source: "北邮校园网"
    pages: 1
    page_start: 0
    selectors:
      item: "ul.newslist.list-unstyled > li"
      title: "a"
      link: "a"
      published_at: "span.time"
      source: "span.author"
      detail_content:
        - "#vsb_content"
        - ".article"
        - ".v_news_content"

  - name: "规章制度"
    url: "http://my.bupt.edu.cn/list.jsp?totalpage=30&PAGENUM={page}&urltype=tree.TreeTempUrl&wbtreeid=1536"
    source: "北邮校园网"
    pages: 1
    page_start: 0
    selectors:
      item: "ul.newslist.list-unstyled > li"
      title: "a"
      link: "a"
      published_at: "span.time"
      source: "span.author"
      detail_content:
        - "#vsb_content"
        - ".article"
        - ".v_news_content"
